name: Deploy to VPS

on:
  push:
    branches:
      - main
      - cem

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH and Deploy
        uses: appleboy/ssh-action@master
        env:
          MCP_BEARER_TOKEN: ${{ secrets.MCP_BEARER_TOKEN }}
          MCP_AGENT_ID: ${{ secrets.MCP_AGENT_ID }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          envs: MCP_BEARER_TOKEN,MCP_AGENT_ID,SESSION_SECRET
          script: |
            set -e
            cd /root/CNCxSOHO-Import-Tracker

            echo "[deploy] === 1. Code update ==="
            git checkout ${{ github.ref_name }}
            git pull origin ${{ github.ref_name }}

            echo "[deploy] === 2. Install + build ==="
            npm install
            npm run build

            echo "[deploy] === 3. MCP env vars (idempotent) ==="
            if [ -n "$MCP_BEARER_TOKEN" ] && ! grep -q '^MCP_BEARER_TOKEN=' .env; then
              printf "\n# MCP server - auto-injected by deploy workflow\nMCP_BEARER_TOKEN=%s\nMCP_AGENT_ID=%s\nMCP_AGENT_USER_ID=\n" "$MCP_BEARER_TOKEN" "${MCP_AGENT_ID:-cowork}" >> .env
              echo "[deploy] MCP env vars added to .env"
            elif grep -q '^MCP_BEARER_TOKEN=' .env; then
              echo "[deploy] MCP_BEARER_TOKEN already in .env, leaving as-is"
            else
              echo "[deploy] WARNING: MCP_BEARER_TOKEN secret not set in GitHub. Add it via Settings -> Secrets and re-run the workflow."
            fi

            echo "[deploy] === 3b. SESSION_SECRET (idempotent) ==="
            if grep -q '^SESSION_SECRET=' .env; then
              echo "[deploy] SESSION_SECRET already in .env, leaving as-is"
            elif [ -n "$SESSION_SECRET" ]; then
              printf "\n# Session secret - auto-injected by deploy workflow\nSESSION_SECRET=%s\n" "$SESSION_SECRET" >> .env
              echo "[deploy] SESSION_SECRET added to .env"
            else
              echo "[deploy] ERROR: SESSION_SECRET not in .env and no GitHub secret set. App will fail to start. Add it via Settings -> Secrets."
            fi

            echo "[deploy] === 4. Apply DB DDL from db/manual-ddl/ (idempotent) ==="
            if command -v psql >/dev/null 2>&1; then
              DB_URL=$(grep '^DATABASE_URL=' .env | head -1 | cut -d= -f2-)
              if [ -n "$DB_URL" ]; then
                for DDL_FILE in db/manual-ddl/*.sql; do
                  [ -f "$DDL_FILE" ] || continue
                  psql "$DB_URL" -v ON_ERROR_STOP=1 -f "$DDL_FILE" && echo "[deploy] DDL applied: $DDL_FILE" || echo "[deploy] WARN: DDL apply non-zero exit for $DDL_FILE (may be already applied)"
                done
              else
                echo "[deploy] WARN: DATABASE_URL not found in .env, skipping DDL"
              fi
            else
              echo "[deploy] WARN: psql not installed on VPS - install with: apt install postgresql-client"
            fi

            echo "[deploy] === 5. nginx /mcp location (idempotent) ==="
            NGINX_CONF=""
            for candidate in /etc/nginx/sites-available/cncsohoimportmanager.com /etc/nginx/sites-enabled/cncsohoimportmanager.com /etc/nginx/sites-available/default /etc/nginx/conf.d/cncsohoimportmanager.com.conf; do
              if [ -f "$candidate" ]; then
                NGINX_CONF="$candidate"
                break
              fi
            done

            SNIPPET_FILE="nginx/cncsoho.mcp.conf.snippet"
            if [ -z "$NGINX_CONF" ]; then
              echo "[deploy] WARN: could not find nginx config for cncsohoimportmanager.com - skipping /mcp injection"
            elif [ ! -f "$SNIPPET_FILE" ]; then
              echo "[deploy] WARN: snippet file $SNIPPET_FILE missing - skipping"
            elif grep -q 'location /mcp' "$NGINX_CONF"; then
              echo "[deploy] nginx /mcp already configured in $NGINX_CONF"
            else
              echo "[deploy] Injecting /mcp into $NGINX_CONF (backup at $NGINX_CONF.bak)"
              cp "$NGINX_CONF" "$NGINX_CONF.bak"
              # Insert snippet content right after the FIRST `server {` line that is followed by `listen 443` or `listen .* ssl`.
              # Strategy: find the line number of the LAST `}` before the first `listen 443/ssl` doesn't help; easier:
              # Insert after the first `server {` line. If multiple server blocks exist (HTTP+HTTPS), the snippet ends up in the FIRST one, which is usually the HTTP redirect block - that still works but isn't optimal. Manual review recommended for split configs.
              SERVER_LINE=$(grep -n '^[[:space:]]*server[[:space:]]*{' "$NGINX_CONF.bak" | head -1 | cut -d: -f1)
              if [ -z "$SERVER_LINE" ]; then
                echo "[deploy] WARN: no 'server {' block found in $NGINX_CONF - skipping injection"
              else
                # Try to find the HTTPS server block (the one with 'listen 443' or 'ssl' after it)
                HTTPS_LINE=""
                for line in $(grep -n '^[[:space:]]*server[[:space:]]*{' "$NGINX_CONF.bak" | cut -d: -f1); do
                  # Look at next 10 lines for a listen 443 or ssl
                  if sed -n "$line,$((line+10))p" "$NGINX_CONF.bak" | grep -qE 'listen[[:space:]]+(443|.*ssl)'; then
                    HTTPS_LINE=$line
                    break
                  fi
                done
                TARGET_LINE=${HTTPS_LINE:-$SERVER_LINE}
                echo "[deploy] Inserting snippet after line $TARGET_LINE of $NGINX_CONF"
                # head up to and including TARGET_LINE, then snippet, then the rest
                {
                  head -n "$TARGET_LINE" "$NGINX_CONF.bak"
                  cat "$SNIPPET_FILE"
                  tail -n +$((TARGET_LINE + 1)) "$NGINX_CONF.bak"
                } > /tmp/nginx-new.conf

                if [ -s /tmp/nginx-new.conf ]; then
                  cp /tmp/nginx-new.conf "$NGINX_CONF"
                  if nginx -t 2>&1; then
                    nginx -s reload
                    echo "[deploy] nginx /mcp injected and reloaded"
                  else
                    echo "[deploy] WARN: nginx -t failed after injection, restoring backup"
                    cp "$NGINX_CONF.bak" "$NGINX_CONF"
                  fi
                else
                  echo "[deploy] WARN: produced empty config, keeping original"
                fi
              fi
            fi

            echo "[deploy] === 6. PM2 reload (with --update-env) ==="
            if pm2 list 2>&1 | grep -q "CNCxSOHO"; then
              pm2 reload ecosystem.config.cjs --update-env
            else
              pm2 start ecosystem.config.cjs
            fi

            echo "[deploy] === 7. Health check ==="
            sleep 3
            if curl -sf http://127.0.0.1:5000/mcp/health > /dev/null; then
              echo "[deploy] OK /mcp/health"
            else
              echo "[deploy] WARN: /mcp/health failed - check PM2 logs"
              pm2 logs CNCxSOHO --lines 30 --nostream || true
            fi

            echo "[deploy] === DONE ==="
